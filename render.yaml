services:
  # FastAPI Web Service
  - type: web
    name: financial-intelligence-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DATABASE_URL
        fromDatabase:
          name: financial-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: financial-redis
          property: connectionString

  # Redis Instance
  - type: redis
    name: financial-redis
    plan: free
    ipAllowList: []

databases:
  - name: financial-db
    databaseName: banking_db
    plan: free
