services:
  # FastAPI Web Service
  - type: web
    name: financial-intelligence-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DATABASE_URL
        fromDatabase:
          name: financial-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: financial-redis
          property: connectionString
    healthCheckPath: /health

  # PostgreSQL Database
  - type: pserv
    name: financial-db
    env: docker
    plan: free
    envVars:
      - key: POSTGRES_USER
        value: postgres
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: banking_db

  # Redis Instance
  - type: redis
    name: financial-redis
    plan: free
    ipAllowList: []
